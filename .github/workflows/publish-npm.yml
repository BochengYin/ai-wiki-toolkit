name: Publish npm Package

on:
  workflow_run:
    workflows:
      - Release Binaries
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish from, for example v0.1.7
        required: true
        type: string
      publish_meta_package:
        description: Also publish the ai-wiki-toolkit meta package
        required: false
        default: true
        type: boolean
      npm_auth_mode:
        description: npm publish auth mode. Auto uses NPM_PUBLISH_TOKEN when present; trusted ignores the token.
        required: false
        default: auto
        type: choice
        options:
          - auto
          - trusted
          - token

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: ${{ (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && vars.NPM_PUBLISH_ENABLED == 'true') || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    env:
      NPM_PUBLISH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

    steps:
      - name: Normalize requested release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        id: requested_tag
        shell: bash
        run: |
          raw='${{ inputs.release_tag }}'
          tag="$(printf '%s' "$raw" | tr -d '[:space:]')"
          if [ -z "$tag" ]; then
            echo "release_tag input must not be empty." >&2
            exit 1
          fi
          case "$tag" in
            v*) ;;
            *) tag="v$tag" ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Check out source at released commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && steps.requested_tag.outputs.tag || github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Show package version
        run: node -p "require('./package.json').version"

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          tag="v$(node -p "require('./package.json').version")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          expected="${{ github.event_name == 'workflow_dispatch' && steps.requested_tag.outputs.tag || '' }}"
          if [ -n "$expected" ] && [ "$expected" != "$tag" ]; then
            echo "Expected tag $expected but checked out package metadata resolves to $tag." >&2
            exit 1
          fi

      - name: Select npm publish auth mode
        id: npm_auth
        shell: bash
        run: |
          requested="${{ github.event_name == 'workflow_dispatch' && inputs.npm_auth_mode || 'auto' }}"
          case "$requested" in
            auto)
              if [ -n "$NPM_PUBLISH_TOKEN" ]; then
                mode=token
              else
                mode=trusted
              fi
              ;;
            token)
              if [ -z "$NPM_PUBLISH_TOKEN" ]; then
                echo "npm_auth_mode=token requires NPM_PUBLISH_TOKEN." >&2
                exit 1
              fi
              mode=token
              ;;
            trusted)
              mode=trusted
              ;;
            *)
              echo "Unsupported npm_auth_mode: $requested" >&2
              exit 1
              ;;
          esac

          if [ "$mode" = "token" ]; then
            echo "mode=token" >> "$GITHUB_OUTPUT"
            echo "Using token-based npm publish mode."
          else
            echo "mode=trusted" >> "$GITHUB_OUTPUT"
            echo "Using trusted publishing mode."
          fi

      - name: Download release archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.release.outputs.tag }}"
          gh release download "$version" --pattern "ai-wiki-toolkit-${version}-*" --dir release-assets

      - name: Stage platform npm packages
        run: >
          PYTHONPATH=src python scripts/stage_npm_platform_packages.py
          --version "$(node -p "require('./package.json').version")"
          --asset-dir release-assets
          --output-dir build/npm-platform-packages

      - name: Show platform package contents
        shell: bash
        run: |
          for dir in build/npm-platform-packages/*; do
            echo "::group::$(basename "$dir")"
            (cd "$dir" && npm pack --dry-run)
            echo "::endgroup::"
          done

      - name: Publish platform npm packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        run: |
          args=()
          if [ "${{ steps.npm_auth.outputs.mode }}" = "trusted" ]; then
            unset NODE_AUTH_TOKEN
            if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
              sed -i '/_authToken/d;/always-auth/d' "$NPM_CONFIG_USERCONFIG"
            fi
            args+=(--provenance)
          fi
          for dir in build/npm-platform-packages/*; do
            npm publish "$dir" "${args[@]}"
          done

      - name: Show package contents
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_meta_package }}
        run: npm pack --dry-run --ignore-scripts

      - name: Publish to npm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.publish_meta_package }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        shell: bash
        run: |
          args=(--ignore-scripts)
          if [ "${{ steps.npm_auth.outputs.mode }}" = "trusted" ]; then
            unset NODE_AUTH_TOKEN
            if [ -n "${NPM_CONFIG_USERCONFIG:-}" ] && [ -f "$NPM_CONFIG_USERCONFIG" ]; then
              sed -i '/_authToken/d;/always-auth/d' "$NPM_CONFIG_USERCONFIG"
            fi
            args+=(--provenance)
          fi
          npm publish "${args[@]}"
