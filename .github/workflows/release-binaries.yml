name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify release version
    runs-on: ubuntu-24.04

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify tag matches package metadata
        run: PYTHONPATH=src python scripts/check_release_version.py "${{ github.ref_name }}"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: verify-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x64
            build_mode: container
            binary_path: dist/aiwiki-toolkit
            docker_platform: linux/amd64
            container_image: python:3.11-bookworm
            container_shell: bash
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            build_mode: container
            binary_path: dist/aiwiki-toolkit
            docker_platform: linux/arm64
            container_image: python:3.11-bookworm
            container_shell: bash
          - runner: ubuntu-24.04
            target: linux-musl-x64
            build_mode: container
            binary_path: dist/aiwiki-toolkit
            docker_platform: linux/amd64
            container_image: python:3.11-alpine
            container_shell: sh
          - runner: windows-2022
            target: windows-x64
            build_mode: host
            binary_path: dist/aiwiki-toolkit.exe
          - runner: windows-11-arm
            target: windows-arm64
            build_mode: host
            binary_path: dist/aiwiki-toolkit.exe
          - runner: macos-15
            target: macos-arm64
            build_mode: host
            binary_path: dist/aiwiki-toolkit
          - runner: macos-15-intel
            target: macos-x64
            build_mode: host
            binary_path: dist/aiwiki-toolkit

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        if: ${{ matrix.build_mode == 'host' }}
        run: python -m pip install ".[dev,release]"

      - name: Run test suite
        if: ${{ matrix.build_mode == 'host' }}
        run: python -m pytest

      - name: Build standalone binary
        if: ${{ matrix.build_mode == 'host' }}
        run: >
          python -m PyInstaller
          --clean
          --noconfirm
          --onefile
          --name aiwiki-toolkit
          --paths src
          --specpath build/pyinstaller
          src/ai_wiki_toolkit/cli.py

      - name: Build Linux release archive in container baseline
        if: ${{ matrix.build_mode == 'container' }}
        run: >
          PYTHONPATH=src python scripts/build_linux_release_in_container.py
          --version "${{ github.ref_name }}"
          --target "${{ matrix.target }}"
          --image "${{ matrix.container_image }}"
          --docker-platform "${{ matrix.docker_platform }}"
          --shell "${{ matrix.container_shell }}"

      - name: Package release archive
        if: ${{ matrix.build_mode == 'host' }}
        run: >
          python scripts/build_release_archive.py
          --binary "${{ matrix.binary_path }}"
          --version "${{ github.ref_name }}"
          --target "${{ matrix.target }}"
          --output-dir release-assets

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-assets/*
          if-no-files-found: error

  verify-linux-runtime:
    name: Verify ${{ matrix.target }} runtime matrix
    runs-on: ${{ matrix.runner }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            target: linux-x64
            docker_platform: linux/amd64
            shell: bash
            extra_checks: ""
          - runner: ubuntu-24.04-arm
            target: linux-arm64
            docker_platform: linux/arm64
            shell: bash
            extra_checks: ""
          - runner: ubuntu-24.04
            target: linux-musl-x64
            docker_platform: linux/amd64
            shell: sh
            extra_checks: >-
              --check older-musl=node:22-alpine
              --check current-musl=node:24-alpine

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download Linux release archive
        uses: actions/download-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: release-assets

      - name: Verify Linux runtime compatibility
        run: >
          PYTHONPATH=src python scripts/check_linux_runtime_matrix.py
          --asset "release-assets/ai-wiki-toolkit-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          --docker-platform "${{ matrix.docker_platform }}"
          --shell "${{ matrix.shell }}"
          ${{ matrix.extra_checks }}

  publish:
    name: Publish GitHub Release assets
    runs-on: ubuntu-24.04
    needs:
      - build
      - verify-linux-runtime
    env:
      HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install release dependencies
        run: python -m pip install ".[release]"

      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release if needed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --verify-tag --generate-notes

      - name: Render Homebrew formula
        run: >
          python scripts/render_homebrew_formula.py
          --repository "${{ github.repository }}"
          --version "${{ github.ref_name }}"
          --asset-dir release-assets
          --license MIT
          --output release-assets/aiwiki-toolkit.rb

      - name: Resolve Homebrew tap repository
        id: tap_repo
        shell: bash
        env:
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
        run: |
          repo="${HOMEBREW_TAP_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/homebrew-tap}"
          printf 'repo=%s\n' "$repo" >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap repository
        if: ${{ env.HOMEBREW_TAP_PAT != '' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.tap_repo.outputs.repo }}
          token: ${{ env.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Sync Homebrew formula into tap
        if: ${{ env.HOMEBREW_TAP_PAT != '' }}
        id: sync_tap
        run: >
          python scripts/sync_homebrew_tap.py
          --formula release-assets/aiwiki-toolkit.rb
          --tap-dir homebrew-tap
          --version "${{ github.ref_name }}"

      - name: Commit and push Homebrew tap update
        if: ${{ env.HOMEBREW_TAP_PAT != '' }}
        shell: bash
        run: |
          cd homebrew-tap
          if [ -z "$(git status --short -- Formula/aiwiki-toolkit.rb)" ]; then
            echo "No Homebrew tap changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/aiwiki-toolkit.rb
          git commit -m "Update aiwiki-toolkit to ${GITHUB_REF_NAME}"
          git push origin HEAD

      - name: Upload release archives
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
